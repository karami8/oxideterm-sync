[advisories]
version = 2

# Unmaintained crates that are transitive dependencies of Tauri / webkit2gtk
# and cannot be replaced without upstream upgrades.  These are "unmaintained"
# notices only — no known exploits.  Re-evaluate when Tauri drops GTK3.
ignore = [
    # gtk-rs GTK3 bindings (multiple IDs for gtk / gtk-sys / gdk / gio / glib)
    { id = "RUSTSEC-2024-0411", reason = "gtk3 is a forced transitive dep of webkit2gtk used by Tauri on Linux; no exploit" },
    { id = "RUSTSEC-2024-0412", reason = "gtk3 glib — same as above" },
    { id = "RUSTSEC-2024-0413", reason = "gtk3 — same as above" },
    { id = "RUSTSEC-2024-0414", reason = "gtk3 gdk — same as above" },
    { id = "RUSTSEC-2024-0415", reason = "gtk3 gio — same as above" },
    { id = "RUSTSEC-2024-0416", reason = "gtk3-sys — same as above" },
    { id = "RUSTSEC-2024-0417", reason = "gtk3 pango — same as above" },
    { id = "RUSTSEC-2024-0418", reason = "gtk3 cairo — same as above" },
    { id = "RUSTSEC-2024-0419", reason = "gtk3 atk — same as above" },
    { id = "RUSTSEC-2024-0420", reason = "gtk3 gdk-pixbuf — same as above" },
    { id = "RUSTSEC-2024-0436", reason = "gtk3 related — same as above" },
    # fxhash — pulled by redb; no vulnerability, just abandoned in favour of rustc-hash
    { id = "RUSTSEC-2025-0057", reason = "fxhash pulled by redb; no known exploit, will be resolved when redb updates" },
    # paste — pulled by russh macro internals; unmaintained but no vulnerability
    { id = "RUSTSEC-2025-0075", reason = "paste pulled by russh; no known exploit" },
    # proc-macro-error — pulled by clap_derive / other macros
    { id = "RUSTSEC-2025-0080", reason = "proc-macro-error is a build-time macro dep; no runtime exposure" },
    # serial / unic-* — pulled by icu4x / unicode-ident transitive deps
    { id = "RUSTSEC-2025-0081", reason = "serial crate; no known exploit" },
    { id = "RUSTSEC-2025-0098", reason = "unic-char-property; no known exploit" },
    { id = "RUSTSEC-2025-0100", reason = "unic-char-range; no known exploit" },
    { id = "RUSTSEC-2024-0370", reason = "unic-common; no known exploit" },
    # Historic advisory still referenced by some crates
    { id = "RUSTSEC-2017-0008", reason = "historic unmaintained notice; no active CVE" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-1-Clause",
    "MIT-0",
    "0BSD",
    "ISC",
    "Zlib",
    "Unlicense",
    "Unicode-3.0",           # ICU 全家桶
    "MPL-2.0",               # cssparser、selectors 等
    "BSL-1.0",
    "Apache-2.0 WITH LLVM-exception",  # target-lexicon
    "CC0-1.0",               # ← 新增
    "CDLA-Permissive-2.0",   # webpki-roots — permissive data license
    "GPL-3.0-only", # 自家 crate
]


# Explicit review notes for multi-licensed crates that mention copyleft.
# We rely on permissive license options (e.g. MIT/Apache) when integrating.
# - r-efi@5.3.0: MIT OR Apache-2.0 OR LGPL-2.1-or-later (we choose MIT/Apache)