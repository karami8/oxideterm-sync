<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — OxideTerm</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AnalyseDeCircuit/OxideTerm/main/src-tauri/icons/32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0c0e12;
        --bg-card: #13161c;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --accent: #5eead4;
        --border: rgba(255,255,255,0.08);
        --font-sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-sans);
        background: var(--bg-deep);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .code {
        font-family: var(--font-mono);
        font-size: clamp(4rem, 12vw, 8rem);
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 1rem;
        opacity: 0.85;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }
      p {
        color: var(--text-muted);
        font-size: 1rem;
        max-width: 28rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      a.back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.65rem 1.25rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: border-color 0.15s;
      }
      a.back:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="back" href="./">← Back to OxideTerm</a>
  </body>
</html>
