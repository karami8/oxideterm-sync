version: 2
updates:
  # ── npm (frontend) ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # Major version bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Rust crates (main Tauri app) ────────────────────────────────────
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Rust crates (CLI companion) ─────────────────────────────────────
  - package-ecosystem: cargo
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ───────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
