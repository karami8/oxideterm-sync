# actions/labeler v5 path-based label rules
# Labels must pre-exist on GitHub (Settings → Labels).
# Required labels: frontend, backend, i18n, docs, cli, ci, plugin, feature, bug, enhancement, security, performance

frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'tsconfig.json'
      - 'tsconfig.node.json'

backend:
  - changed-files:
    - any-glob-to-any-file:
      - 'src-tauri/**'

i18n:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/locales/**'

docs:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'SECURITY.md'
      - 'PLUGIN_DEVELOPMENT.md'

cli:
  - changed-files:
    - any-glob-to-any-file:
      - 'cli/**'

plugin:
  - changed-files:
    - any-glob-to-any-file:
      - 'plugin-api.d.ts'
      - 'src/lib/plugin/**'
      - 'PLUGIN_DEVELOPMENT.md'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
