# Issue picker configuration — https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository
blank_issues_enabled: true
contact_links:
  - name: 🔒 Security vulnerability / 安全漏洞
    url: https://github.com/AnalyseDeCircuit/OxideTerm/security/advisories/new
    about: >
      Report privately via GitHub — do not open a public issue for undisclosed vulnerabilities.
      请勿对未公开漏洞发公开 Issue，请使用 GitHub 私密漏洞报告。
  - name: 📖 Contributing & PR policy / 贡献与 PR 说明
    url: https://github.com/AnalyseDeCircuit/OxideTerm/blob/main/CONTRIBUTING.md
    about: >
      We are not accepting PRs (maintenance capacity). Build-from-source and plugin options are documented.
      目前不接 PR；构建说明与插件见 CONTRIBUTING。
