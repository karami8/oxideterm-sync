name: Feature Request
description: Suggest an improvement or new capability / 功能建议或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Pull requests:** PRs are welcome, but please [open an Issue first](https://github.com/AnalyseDeCircuit/OxideTerm/blob/main/CONTRIBUTING.md) to discuss the approach. For extensions, consider a [plugin](https://github.com/AnalyseDeCircuit/OxideTerm/blob/main/docs/reference/PLUGIN_DEVELOPMENT.md).

        **PR：** 欢迎提交 PR，但请先[开 Issue 讨论方案](https://github.com/AnalyseDeCircuit/OxideTerm/blob/main/CONTRIBUTING.md)。扩展能力可优先考虑[插件](https://github.com/AnalyseDeCircuit/OxideTerm/blob/main/docs/reference/PLUGIN_DEVELOPMENT.md)。

        ---

        **Scope:** OxideTerm is an SSH-based terminal and DevOps platform (local shells, SSH, SFTP, remote IDE, port forwarding, AI, plugins). Requests for unrelated remote-access protocols  are out of scope and will be closed.
        **范围：** OxideTerm 是基于 SSH 的终端与 DevOps 平台（本地终端、SSH、SFTP、远程 IDE、端口转发、AI、插件）。与此无关的远程访问协议不在项目范围内，相关请求将被直接关闭。

        **One request per issue.** Multiple unrelated suggestions in a single issue will be closed — please open separate issues.
        **每个 Issue 只提一个建议。** 在同一 Issue 中混合多条不相关建议将被直接关闭，请分别提交。

  - type: input
    id: version
    attributes:
      label: OxideTerm version / 版本
      description: "e.g. `1.1.13` — from Settings → Help & About, or the title bar"
      placeholder: "1.1.13"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case / 问题或使用场景
      description: What are you trying to do? What is painful today?
      placeholder: When managing many jump hosts, I wish …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / 期望方案
      description: |
        How would you like it to work? Mockups or examples welcome.
        Answers like "N/A", "none", "you figure it out" will cause the issue to be closed.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 已考虑的替代方案
      description: Other tools, workflows, or workarounds you already use.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area (best guess) / 大致领域
      options:
        - Terminal (local / SSH)
        - SFTP / file manager
        - IDE mode
        - Port forwarding / topology
        - AI / OxideSens / MCP / RAG
        - Plugins
        - Settings / themes / i18n
        - Windows / WSL / graphics
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I am using the latest release and have confirmed this feature does not already exist / 我正在使用最新正式版，并已确认该功能尚不存在
          required: true
        - label: This issue contains a single, focused feature request (not a list of unrelated ideas) / 本 Issue 只包含一个明确的功能建议（而非多条不相关的想法）
          required: true
        - label: This request is within OxideTerm's scope (terminal, SSH, SFTP, IDE, forwarding, AI, plugins) — not an unrelated protocol / 本建议在 OxideTerm 的项目范围内（终端、SSH、SFTP、IDE、转发、AI、插件），而非无关协议
          required: true
        - label: I searched existing issues for duplicates / 我已搜索过是否已有相同 Issue
          required: true
        - label: I have described a concrete problem or use case and a proposed solution / 我已描述了具体的问题或使用场景，并给出了期望方案
          required: true
        - label: |
            I understand OxideTerm is free, open-source software — not a commercial product with 24/7 support. The author's time and energy are limited. I agree that issues with vague descriptions, low-effort content, insufficient information, or prolonged inactivity may be closed without further notice.
            我明白 OxideTerm 是免费开源软件，而非提供 7×24 小时支持的商业产品，作者本人时间与精力均有限。我同意：描述模糊、内容敷衍、信息不足或长时间无回复的 Issue 将有可能被直接关闭。
          required: true
